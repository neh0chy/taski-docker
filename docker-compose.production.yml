volumes:
  pg_data:
    name: pg_data
  static:
    name: static

services:
  db:
    image: postgres:13
    container_name: db
    restart: always
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
  backend:
    image: 4y3t98y4/taski_backend
    container_name: backend
    restart: always
    env_file: .env
    volumes:
      - static:/backend_static

  frontend:
    image: 4y3t98y4/taski_frontend
    container_name: frontend
    env_file: .env
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - static:/frontend_static

  gateway:
    image: 4y3t98y4/taski_gateway
    container_name: gateway
    restart: always
    env_file: .env
    volumes:
      - static:/staticfiles
    ports:
      - 8000:80
